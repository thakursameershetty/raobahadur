<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  @keyframes glyphIn{0%{opacity:0;transform:translateY(14px) scale(.82) rotate(-3deg)}60%{opacity:1}100%{opacity:1;transform:none}}
  @keyframes softPulse{0%,100%{opacity:.5}50%{opacity:.9}}
  textarea::placeholder{color:rgba(220,200,160,.32)}
  textarea:focus{outline:none}
</style>
</helmet>
<div style="min-height:100vh;width:100%;background:{{ bgCss }};font-family:'Outfit',system-ui,sans-serif;color:#e8dcc2;display:flex;flex-direction:column;align-items:center;padding:clamp(28px,5vw,72px) clamp(18px,4vw,64px) 80px;position:relative;overflow-x:hidden">

  <div style="position:fixed;inset:0;pointer-events:none;background:radial-gradient(120% 80% at 50% -10%, rgba(214,170,92,.10), transparent 60%), radial-gradient(100% 100% at 50% 120%, rgba(0,0,0,.55), transparent 55%)"></div>

  <header style="text-align:center;position:relative;z-index:2;margin-bottom:clamp(28px,4vw,52px)">
    <div style="font-size:13px;letter-spacing:.42em;text-transform:uppercase;color:rgba(214,178,110,.7);font-weight:400;margin-bottom:14px">Carved&nbsp;&middot;&nbsp;Hand-hewn&nbsp;&middot;&nbsp;Alphabet</div>
    <h1 style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(40px,7vw,76px);line-height:.95;letter-spacing:.01em;background:linear-gradient(180deg,#f4e3bd,#c9974f 70%,#a9742f);-webkit-background-clip:text;background-clip:text;color:transparent">Timber&nbsp;Type</h1>
    <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(17px,2.4vw,23px);color:rgba(232,220,194,.62);margin-top:10px;max-width:30ch;margin-left:auto;margin-right:auto;text-wrap:pretty">Type anything &mdash; watch it grow in living, golden wood.</p>
  </header>

  <!-- Display canvas -->
  <section style="position:relative;z-index:2;width:100%;max-width:1120px;border:1px solid rgba(214,178,110,.16);border-radius:6px;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(0,0,0,.18));box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 30px 70px -40px rgba(0,0,0,.8);padding:clamp(26px,4vw,52px);min-height:200px;display:flex;align-items:center;justify-content:center">
    <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ true }}">
      <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(20px,3vw,30px);color:rgba(214,178,110,.45);animation:softPulse 3.4s ease-in-out infinite">the canvas waits&hellip;</div>
    </sc-if>
    <div style="display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:center;width:100%;row-gap:{{ lineGap }}px;column-gap:0">
      <sc-for list="{{ words }}" as="tok" hint-placeholder-count="0">
        <sc-if value="{{ tok.isWord }}" hint-placeholder-val="{{ false }}">
          <span style="{{ wordStyle }}">
            <sc-for list="{{ tok.glyphs }}" as="g" hint-placeholder-count="0">
              <sc-if value="{{ g.isImg }}" hint-placeholder-val="{{ false }}">
                <img src="{{ g.src }}" width="{{ g.w }}" height="{{ g.h }}" alt="{{ g.ch }}" style="{{ imgStyle }}">
              </sc-if>
              <sc-if value="{{ g.isOther }}" hint-placeholder-val="{{ false }}">
                <span style="{{ g.style }}">{{ g.ch }}</span>
              </sc-if>
            </sc-for>
          </span>
        </sc-if>
        <sc-if value="{{ tok.isSpace }}" hint-placeholder-val="{{ false }}">
          <span style="{{ spaceStyle }}"></span>
        </sc-if>
        <sc-if value="{{ tok.isBr }}" hint-placeholder-val="{{ false }}">
          <span style="flex-basis:100%;height:0"></span>
        </sc-if>
      </sc-for>
    </div>
  </section>

  <!-- Input -->
  <div style="position:relative;z-index:2;width:100%;max-width:1120px;margin-top:clamp(20px,3vw,34px)">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;color:rgba(214,178,110,.62);font-size:12px;letter-spacing:.26em;text-transform:uppercase">
      <span style="width:6px;height:6px;border-radius:50%;background:#d6b26e;box-shadow:0 0 10px #d6b26e"></span>Your text
    </div>
    <textarea value="{{ text }}" onInput="{{ onInput }}" rows="3" placeholder="Type letters A&ndash;Z and numbers 0&ndash;9&hellip;" spellcheck="false" style="width:100%;resize:vertical;background:rgba(0,0,0,.28);border:1px solid rgba(214,178,110,.22);border-radius:6px;padding:18px 20px;color:#f0e6cf;font-family:'Outfit',sans-serif;font-size:19px;line-height:1.5;letter-spacing:.02em;caret-color:#d6b26e"></textarea>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:14px">
      <sc-for list="{{ samples }}" as="s" hint-placeholder-count="3">
        <button onClick="{{ s.go }}" style="background:rgba(214,178,110,.08);border:1px solid rgba(214,178,110,.24);color:rgba(232,220,194,.85);font-family:'Outfit',sans-serif;font-size:13px;letter-spacing:.04em;padding:8px 15px;border-radius:999px;cursor:pointer" style-hover="background:rgba(214,178,110,.2);border-color:rgba(214,178,110,.5)">{{ s.label }}</button>
      </sc-for>
      <button onClick="{{ clear }}" style="background:transparent;border:1px solid rgba(214,178,110,.16);color:rgba(232,220,194,.55);font-family:'Outfit',sans-serif;font-size:13px;letter-spacing:.04em;padding:8px 15px;border-radius:999px;cursor:pointer;margin-left:auto" style-hover="color:#f0e6cf;border-color:rgba(214,178,110,.4)">Clear</button>
    </div>
  </div>

  <footer style="position:relative;z-index:2;margin-top:48px;font-size:12px;letter-spacing:.06em;color:rgba(214,178,110,.4);font-family:'Outfit',sans-serif">36 hand-carved glyphs &middot; A&ndash;Z &middot; 0&ndash;9</footer>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:760},&quot;fontSize&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:78,&quot;min&quot;:36,&quot;max&quot;:160,&quot;tsType&quot;:&quot;number&quot;},&quot;tracking&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:5,&quot;min&quot;:0,&quot;max&quot;:40,&quot;tsType&quot;:&quot;number&quot;},&quot;glow&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;bgCss&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;radial-gradient(140% 120% at 50% 0%, #1d2c22 0%, #131c16 45%, #0c120e 100%)&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
const META = {
  "0":[111,135],"1":[48,131],"2":[91,137],"3":[84,135],"4":[100,133],"5":[87,132],
  "6":[107,133],"7":[91,130],"8":[97,133],"9":[111,133],
  "A":[127,130],"B":[114,131],"C":[112,114],"D":[107,113],"E":[85,115],"F":[82,113],
  "G":[101,113],"H":[109,113],"I":[49,113],"J":[83,112],"K":[115,120],"L":[86,114],
  "M":[118,116],"N":[107,116],"O":[111,119],"P":[87,115],"Q":[118,121],"R":[111,119],
  "S":[94,125],"T":[91,120],"U":[104,120],"V":[100,122],"W":[133,122],"X":[114,118],
  "Y":[113,117],"Z":[96,122]
};
const REF = 116; // nominal cap reference height in source px
const SAMPLES = [
  {label:"TIMBER 2026", text:"TIMBER 2026"},
  {label:"HELLO WORLD", text:"HELLO WORLD"},
  {label:"OAK & GOLD", text:"GOLDEN OAK"}
];

class Component extends DCLogic {
  state = { text: "TIMBER 2026" };

  componentDidMount(){
    try{
      const saved = localStorage.getItem("timbertype.text");
      if (saved !== null) this.setState({ text: saved });
    }catch(e){}
  }

  setText(t){
    this.setState({ text: t });
    try{ localStorage.setItem("timbertype.text", t); }catch(e){}
  }

  renderVals(){
    const fontSize = this.props.fontSize ?? 78;
    const tracking = this.props.tracking ?? 5;
    const glow = this.props.glow ?? true;
    const text = this.state.text ?? "";
    const isEmpty = text.trim().length === 0;

    const otherSize = Math.round(fontSize * 0.6);
    const otherStyle = "display:inline-flex;align-items:flex-end;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:"+otherSize+"px;line-height:1;color:rgba(214,178,110,.4);padding:0 .04em";

    // tokenize into words / spaces / breaks
    const words = [];
    let cur = null;
    const flush = () => { if (cur && cur.glyphs.length){ words.push(cur); } cur = null; };
    for (const raw of text){
      if (raw === "\n"){ flush(); words.push({ type:"br", isBr:true }); continue; }
      if (raw === " " || raw === "\t"){ flush(); words.push({ type:"space", isSpace:true }); continue; }
      const ch = raw.toUpperCase();
      const m = META[ch];
      if (!cur) cur = { type:"word", isWord:true, glyphs:[] };
      if (m){
        const h = Math.round(fontSize * m[1] / REF);
        const w = Math.round(h * m[0] / m[1]);
        const file = /[0-9]/.test(ch) ? ("d" + ch) : ch;
        cur.glyphs.push({ isImg:true, src:"glyphs/" + file + ".png", w, h, ch });
      } else {
        // unsupported character: faint serif fallback so nothing is silently lost
        cur.glyphs.push({ isOther:true, ch:raw, style:otherStyle });
      }
    }
    flush();

    const samples = SAMPLES.map(s => ({ label:s.label, go:()=>this.setText(s.text) }));

    const imgStyle = "display:block;height:auto;vertical-align:bottom;animation:glyphIn .42s cubic-bezier(.2,.9,.3,1.2) both;" +
      (glow ? "filter:drop-shadow(0 5px 9px rgba(90,55,18,.5)) drop-shadow(0 0 16px rgba(214,170,92,.22));" : "");

    return {
      bgCss: this.props.bgCss ?? "radial-gradient(140% 120% at 50% 0%, #1d2c22 0%, #131c16 45%, #0c120e 100%)",
      text,
      isEmpty,
      words,
      imgStyle,
      wordStyle: "display:inline-flex;align-items:flex-end;white-space:nowrap;column-gap:"+tracking+"px",
      spaceStyle: "display:inline-block;width:"+Math.round(fontSize*0.4)+"px",
      lineGap: Math.round(fontSize * 0.34),
      samples,
      onInput: (e)=> this.setText(e.target.value),
      clear: ()=> this.setText("")
    };
  }
}
</script>
</body>
</html>
