<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Rao Bahadur - Parallax Hero</title>
  <style>
    /* 1. RESET & BASE STYLES
    */
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #030807;
      /* Deep cinematic teal/black */
      overflow: hidden;
      /* Prevents scrollbars during mouse movement */
      font-family: sans-serif;
    }

    /* 2. PARALLAX CONTAINER 
      Acts as the stage for the layers.
    */
    #parallax-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 3. INDIVIDUAL LAYERS
      We make them 110% size so when they shift, the edges of the screen 
      don't show the background underneath.
    */
    .parallax-layer {
      position: absolute;
      top: -5%;
      left: -5%;
      width: 110%;
      height: 110%;
      object-fit: cover;
      /* Ensures images fill the screen without stretching */
      will-change: transform;
      /* Hints to the browser to optimize this */
      pointer-events: none;
      /* Lets the mouse interact with the container, not the images */

      /* The magic happens here: We use translate3d to force GPU hardware acceleration.
        The var(--x) and var(--y) are updated dynamically by our JavaScript.
      */
      transform: translate3d(calc(var(--x, 0) * 1px), calc(var(--y, 0) * 1px), 0);
    }

    /* Optional: Add a subtle vignette over everything to blend the edges */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, transparent 50%, rgba(0, 0, 0, 0.8) 100%);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>

<body>

  <div id="parallax-container">
    <img src="layer1.webp" class="parallax-layer" data-speed="0.015" alt="Background">

    <img src="layer2.webp" class="parallax-layer" data-speed="0.03" alt="Feathers">

    <img src="layer3.webp" class="parallax-layer" data-speed="0.05" alt="Back Elements">

    <img src="layer4.webp" class="parallax-layer" data-speed="0.08" alt="Satyadev">

    <img src="layer5.webp" class="parallax-layer" data-speed="0.14" alt="Foreground Flora">

    <img src="layer6.webp" class="parallax-layer" data-speed="0.22" alt="Typography">

    <div class="vignette"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('parallax-container');
      const layers = document.querySelectorAll('.parallax-layer');

      // The destination coordinates based on the mouse
      let targetX = 0;
      let targetY = 0;

      // The current coordinates (these will catch up to targetX/Y)
      let currentX = 0;
      let currentY = 0;

      // 1. Track Mouse Movement
      container.addEventListener('mousemove', (e) => {
        // Find the center of the screen
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        // Calculate how far the mouse is from the center.
        // We invert it so the layers move opposite to the mouse direction.
        targetX = (centerX - e.clientX);
        targetY = (centerY - e.clientY);
      });

      // 2. Handle Window Resizing gracefully
      window.addEventListener('resize', () => {
        // Reset targets if they resize to avoid weird snapping
        targetX = 0;
        targetY = 0;
      });

      // 3. The Animation Physics Loop
      function animate() {
        // Lerp (Linear Interpolation)
        // This math makes currentX slowly move towards targetX.
        // 0.08 is the easing factor. 
        // -> Lower number (e.g., 0.02) = very slow, floaty drag.
        // -> Higher number (e.g., 0.2) = fast, snappy response.
        currentX += (targetX - currentX) * 0.08;
        currentY += (targetY - currentY) * 0.08;

        // Apply the newly calculated positions to each layer
        layers.forEach(layer => {
          // Grab the specific speed multiplier for this layer
          const speed = parseFloat(layer.getAttribute('data-speed'));

          // Calculate the final X and Y shift
          const x = currentX * speed;
          const y = currentY * speed;

          // Push the values into the CSS variables
          layer.style.setProperty('--x', x);
          layer.style.setProperty('--y', y);
        });

        // Request the next frame to keep the loop running at 60fps
        requestAnimationFrame(animate);
      }

      // Kick off the loop
      animate();
    });
  </script>

</body>

</html>
