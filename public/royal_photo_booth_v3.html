<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Rao Bahadur · Photo Booth</title>

  <link rel="preload" as="image"
    href="https://res.cloudinary.com/dbn2ye2zo/image/upload/c_limit,w_1080/f_auto,q_auto/v1782402353/satyadev_assets/photobooth/background.jpg">
  <link rel="preload" as="image"
    href="https://res.cloudinary.com/dbn2ye2zo/image/upload/c_limit,w_800/f_auto,q_auto/v1782402354/satyadev_assets/photobooth/leftwing.png">
  <link rel="preload" as="image"
    href="https://res.cloudinary.com/dbn2ye2zo/image/upload/c_limit,w_800/f_auto,q_auto/v1782402355/satyadev_assets/photobooth/rightwing.png">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #C9A84C;
      --gold-light: #F0D693;
      --gold-dim: #7A6028;
      --gold-glow: rgba(201, 168, 76, 0.4);
      --bg-deep: #060A06;
      --border-gold: rgba(201, 168, 76, 0.35);
      --text-gold: #E8C97A;
      --text-muted: rgba(201, 168, 76, 0.5);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg-deep);
      color: var(--text-gold);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease, transform 0.6s ease;
      will-change: opacity, transform;
    }

    .screen-hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.97);
    }

    /* ── INTRO ── */
    #screen-intro {
      background: var(--bg-deep);
      gap: 1.2rem;
      padding: 2rem;
      text-align: center;
      z-index: 20;
    }

    .intro-badge {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .intro-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.8rem, 7vw, 3rem);
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.08em;
      line-height: 1.1;
      text-shadow: 0 0 40px rgba(240, 214, 147, 0.25);
    }

    .intro-preview {
      position: relative;
      width: min(260px, 72vw);
      aspect-ratio: 3/4;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-gold);
      box-shadow: 0 0 50px rgba(201, 168, 76, 0.15);
    }

    .intro-preview .bg-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .intro-preview .wings-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .intro-sub {
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      font-style: italic;
      color: rgba(240, 214, 147, 0.55);
      letter-spacing: 0.04em;
      line-height: 1.6;
      max-width: 280px;
    }

    .btn-royal {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.9rem 2.4rem;
      border: 1px solid var(--gold);
      background: rgba(201, 168, 76, 0.12);
      color: var(--gold-light);
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 20px rgba(201, 168, 76, 0.1);
      -webkit-tap-highlight-color: transparent;
    }

    .btn-royal:active {
      background: rgba(201, 168, 76, 0.3);
      transform: scale(0.97);
    }

    .btn-royal:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── BOOTH ── */
    #screen-booth {
      z-index: 10;
      background: #000;
      padding: 0;
      justify-content: flex-start;
    }

    #boothCanvas {
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Flip button: desktop hidden, mobile/tablet only */
    #mirrorBtn {
      display: none;
    }

    @media (max-width: 768px) {
      #mirrorBtn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
      }
    }

    /* Overlay UI */
    #booth-ui {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
      z-index: 30;
    }

    /* Top bar */
    .booth-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: max(1rem, env(safe-area-inset-top)) 1.2rem 0.8rem;
      background: linear-gradient(to bottom, rgba(6, 10, 6, 0.8) 0%, transparent 100%);
      pointer-events: auto;
    }

    .booth-brand {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      color: var(--gold);
      opacity: 0;
      transition: opacity 0.5s;
    }

    .live-pill::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4CAF50;
      box-shadow: 0 0 8px rgba(76, 175, 80, 0.9);
      animation: blink 1.4s infinite;
    }

    .live-pill.on {
      opacity: 1;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.35
      }
    }

    /* Bottom bar */
    .booth-bottombar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      padding: 0.8rem 1rem max(1.2rem, env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(6, 10, 6, 0.9) 0%, transparent 100%);
      pointer-events: auto;
    }

    /* Wing size control */
    .wing-size-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      background: rgba(7, 22, 10, 0.75);
      border: 1px solid var(--border-gold);
      border-radius: 9999px;
      padding: 0.45rem 1rem;
      backdrop-filter: blur(12px);
    }

    .ctrl-label {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .gold-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100px;
      height: 3px;
      border-radius: 2px;
      background: rgba(201, 168, 76, 0.3);
      outline: none;
    }

    .gold-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold-glow);
      cursor: pointer;
    }

    .gold-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--gold);
      border: none;
    }

    .ctrl-val {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      color: var(--gold);
      min-width: 32px;
      text-align: right;
    }

    /* Position chips */
    .chip-row {
      display: flex;
      gap: 0.5rem;
    }

    .chip {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border: 1px solid var(--border-gold);
      border-radius: 9999px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.22s;
      -webkit-tap-highlight-color: transparent;
    }

    .chip.active {
      border-color: var(--gold);
      background: rgba(201, 168, 76, 0.15);
      color: var(--gold-light);
      box-shadow: 0 0 10px rgba(201, 168, 76, 0.15);
    }

    /* Action row */
    .action-row {
      display: flex;
      align-items: center;
      gap: 1.4rem;
    }

    .btn-ghost {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.6rem 1.1rem;
      border: 1px solid var(--border-gold);
      background: rgba(6, 10, 6, 0.55);
      color: var(--text-muted);
      border-radius: 9999px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.25s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-ghost:active {
      border-color: var(--gold);
      color: var(--gold-light);
    }

    /* Shutter */
    .shutter {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      background: transparent;
      cursor: pointer;
      position: relative;
      box-shadow: 0 0 22px rgba(201, 168, 76, 0.3), inset 0 0 18px rgba(201, 168, 76, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .shutter::after {
      content: '';
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240, 214, 147, 0.9) 0%, rgba(201, 168, 76, 0.7) 100%);
      box-shadow: 0 0 14px rgba(201, 168, 76, 0.5);
    }

    .shutter:active {
      transform: scale(0.9);
      box-shadow: 0 0 35px rgba(201, 168, 76, 0.55);
    }

    .shutter:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    /* ── LOADING ── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: #060A06;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      transition: opacity 0.5s;
    }

    #loading-overlay.gone {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid rgba(201, 168, 76, 0.2);
      border-top-color: var(--gold);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .load-txt {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      animation: fadepulse 1.4s ease infinite;
    }

    @keyframes fadepulse {

      0%,
      100% {
        opacity: 0.5
      }

      50% {
        opacity: 1
      }
    }

    /* ── SHARE ── */
    #screen-share {
      z-index: 40;
      background: var(--bg-deep);
      gap: 1.2rem;
      padding: 1.5rem;
    }

    .share-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      font-weight: 600;
      color: var(--gold-light);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .share-frame {
      width: min(320px, 80vw);
      max-height: 55vh;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-gold);
      box-shadow: 0 0 50px rgba(201, 168, 76, 0.2);
    }

    .share-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .share-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .share-hint {
      font-size: 0.75rem;
      font-style: italic;
      color: var(--text-muted);
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
    }

    .btn-secondary {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.65rem 1.6rem;
      border: 1px solid var(--border-gold);
      background: transparent;
      color: var(--text-muted);
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.25s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-secondary:active {
      border-color: var(--gold);
      color: var(--gold-light);
    }

    /* ── FLASH ── */
    #flash {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(240, 214, 147, 0.92);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.06s ease-in;
    }

    #flash.on {
      opacity: 1;
      transition: opacity 0.06s ease-in;
    }

    #flash.fade {
      opacity: 0;
      transition: opacity 0.4s ease-out;
    }

    /* ── COUNTDOWN ── */
    #countdown {
      position: fixed;
      inset: 0;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    #countdown.visible {
      opacity: 1;
    }

    #countdown-num {
      font-family: 'Cinzel', serif;
      font-size: clamp(5rem, 25vw, 9rem);
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 40px rgba(212, 175, 55, 0.9), 0 4px 24px rgba(0, 0, 0, 0.7);
      animation: countPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      font-variant-numeric: lining-nums tabular-nums;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1.2em;
      height: 1.2em;
    }

    @keyframes countPop {
      from {
        transform: scale(0.4);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Shutter press animation */
    @keyframes shutterPop {
      0% {
        transform: scale(1);
      }

      30% {
        transform: scale(0.84);
      }

      70% {
        transform: scale(1.06);
      }

      100% {
        transform: scale(1);
      }
    }

    .shutter.firing {
      animation: shutterPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(160, 30, 30, 0.92);
      border: 1px solid rgba(255, 80, 80, 0.4);
      color: #fff;
      border-radius: 9999px;
      padding: 0.55rem 1.4rem;
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
    }

    /* Shoulder debug dot — hidden by default */
    .dbg {
      display: none;
    }
  </style>
</head>

<body>

  <div id="flash"></div>
  <div id="countdown"><span id="countdown-num">2</span></div>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="load-txt">Preparing Frame…</div>
  </div>
  <div id="toast"></div>

  <!-- SCREEN 1: INTRO -->
  <div class="screen screen-hidden" id="screen-intro">
    <div class="intro-badge">Rao Bahadur · 2026</div>
    <div class="intro-title">Photo Booth</div>
    <div class="intro-preview">
      <img class="bg-layer" id="bgPreview" alt="">
      <img class="wings-layer" id="wingsPreview" alt="">
    </div>
    <div class="intro-sub">Step into the frame.<br>The wings are yours.</div>
    <button class="btn-royal" id="enterBtn">Enter the Frame</button>
  </div>

  <!-- SCREEN 2: BOOTH -->
  <div class="screen screen-hidden" id="screen-booth">
    <canvas id="boothCanvas"></canvas>
    <div id="booth-ui">
      <div class="booth-topbar">
        <span class="booth-brand">Rao Bahadur · Photo Booth</span>
        <span class="live-pill" id="livePill">Live</span>
      </div>
      <div class="booth-bottombar">
        <div class="wing-size-row">
          <span class="ctrl-label">Wing Size</span>
          <input type="range" class="gold-slider" id="wingScale" min="40" max="200" value="100">
          <span class="ctrl-val" id="wingScaleVal">100%</span>
        </div>
        <div class="wing-size-row">
          <span class="ctrl-label">↕ Vertical</span>
          <input type="range" class="gold-slider" id="wingYAdj" min="-50" max="50" value="30">
          <span class="ctrl-val" id="wingYAdjVal">30</span>
        </div>
        <div class="wing-size-row">
          <span class="ctrl-label">↔ Inward</span>
          <input type="range" class="gold-slider" id="wingXAdj" min="-30" max="30" value="-12">
          <span class="ctrl-val" id="wingXAdjVal">-14</span>
        </div>

        <div class="action-row">
          <button class="btn-ghost" id="backBtn">← Back</button>
          <button class="shutter" id="shutterBtn" disabled></button>
          <button class="btn-ghost" id="mirrorBtn">⇄ Flip</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SCREEN 3: SHARE -->
  <div class="screen screen-hidden" id="screen-share" style="position: relative; overflow: hidden;">
    <img src="/assets/extras/peacock-feather.png" alt=""
      style="position: absolute; top: -20px; right: -40px; width: 180px; transform: rotate(15deg); opacity: 0.9; pointer-events: none; z-index: 0;">
    <img src="/assets/extras/spooky-pumpkin.png" alt=""
      style="position: absolute; bottom: 80px; left: -20px; width: 150px; opacity: 0.85; pointer-events: none; z-index: 0;">
    <div class="share-title" style="position: relative; z-index: 1;">Your Portrait</div>
    <div class="share-frame" style="position: relative; z-index: 1;"><img id="capturedImg" src="" alt="Your portrait">
    </div>
    <div class="share-actions" style="position: relative; z-index: 1;">
      <button class="btn-royal" id="downloadBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Save Photo
      </button>
      <button class="btn-royal" id="shareBtn" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
          <polyline points="16 6 12 2 8 6"></polyline>
          <line x1="12" y1="2" x2="12" y2="15"></line>
        </svg>
        Share
      </button>
      <button class="btn-secondary" id="retakeBtn">Retake</button>
    </div>
    <div class="share-hint" id="shareHint">Long-press the photo to save on mobile</div>
  </div>

  <video id="videoEl" autoplay playsinline muted style="display:none;position:fixed;"></video>

  <script type="module">
    import { ImageSegmenter, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.15/+esm";
    // We'll use MediaPipe Pose via the older holistic/pose CDN for shoulder detection
    // Using @mediapipe/pose which exposes landmarks including shoulders (11=left, 12=right)

    (function () {

      // ── Elements ────────────────────────────────────────────────────────
      const video = document.getElementById('videoEl');
      const canvas = document.getElementById('boothCanvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: false });
      const loadingEl = document.getElementById('loading-overlay');
      const sIntro = document.getElementById('screen-intro');
      const sBooth = document.getElementById('screen-booth');
      const sShare = document.getElementById('screen-share');
      const enterBtn = document.getElementById('enterBtn');
      const shutterBtn = document.getElementById('shutterBtn');
      const backBtn = document.getElementById('backBtn');
      const retakeBtn = document.getElementById('retakeBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const mirrorBtn = document.getElementById('mirrorBtn');
      const livePill = document.getElementById('livePill');
      const wingScaleEl = document.getElementById('wingScale');
      const wingScaleV = document.getElementById('wingScaleVal');
      const capturedImg = document.getElementById('capturedImg');
      const flash = document.getElementById('flash');
      const toast = document.getElementById('toast');



      // ── Assets ──────────────────────────────────────────────────────────
      const bgImg = new Image();
      bgImg.crossOrigin = "anonymous";
      const leftImg = new Image();   // left peacock wing
      leftImg.crossOrigin = "anonymous";
      const rightImg = new Image();  // right peacock wing
      rightImg.crossOrigin = "anonymous";

      // ── State ───────────────────────────────────────────────────────────
      const S = {
        segmenter: null,
        pose: null,         // MediaPipe Pose instance
        stream: null,
        running: false,
        animId: null,
        mirror: true,
        wingScale: 1.0,
        wingYAdj: 30,       // pixel fine-tune: shift wings up/down on shoulder (default 30, range 26–31)
        wingXAdj: -14,      // pixel fine-tune: shift attachment point inward/outward (default -14, range -18–-11)
        yShift: 0,          // fraction of canvas H: 0=shoulder, -0.15=higher, +0.15=lower
        prevMask: null,
        lastTs: 0,
        // Smoothed shoulder positions (normalized 0-1)
        leftShoulder: { x: 0.25, y: 0.35 },
        rightShoulder: { x: 0.75, y: 0.35 },
        poseReady: false,

        segmentLastTs: 0,
      };

      const LERP = 0.18;  // how fast shoulders follow (0=frozen, 1=instant)

      // ── Off-screen canvas & Buffers ────────────────────────────────────────
      const frameCanvas = document.createElement('canvas');
      const frameCtx = frameCanvas.getContext('2d', { willReadFrequently: true });

      // REUSABLE BUFFERS (Prevents memory leaks!)
      const personC = document.createElement('canvas');
      const personCtx = personC.getContext('2d', { willReadFrequently: false });
      let alphaBuffer = null;
      let finBuffer = null;
      let fmBuffer = null;

      // ── Asset loading ────────────────────────────────────────────────────
      let loaded = 0;
      function onLoad() { if (++loaded >= 3) revealIntro(); }

      bgImg.onload = leftImg.onload = rightImg.onload = onLoad;
      bgImg.onerror = leftImg.onerror = rightImg.onerror = onLoad; // don't hang

      bgImg.src = 'https://res.cloudinary.com/dbn2ye2zo/image/upload/c_limit,w_1080/f_auto,q_auto/v1782402353/satyadev_assets/photobooth/background.jpg';  // background frame
      leftImg.src = 'https://res.cloudinary.com/dbn2ye2zo/image/upload/c_limit,w_800/f_auto,q_auto/v1782402354/satyadev_assets/photobooth/leftwing.png';   // left peacock wing
      rightImg.src = 'https://res.cloudinary.com/dbn2ye2zo/image/upload/c_limit,w_800/f_auto,q_auto/v1782402355/satyadev_assets/photobooth/rightwing.png'; // right peacock wing

      // Populate intro preview
      document.getElementById('bgPreview').src = 'https://res.cloudinary.com/dbn2ye2zo/image/upload/c_fill,w_400/f_auto,q_auto/v1782402353/satyadev_assets/photobooth/background.jpg';
      document.getElementById('wingsPreview').src = 'https://res.cloudinary.com/dbn2ye2zo/image/upload/c_limit,w_400/f_auto,q_auto/v1782402357/satyadev_assets/photobooth/wings.png';

      function revealIntro() {
        loadingEl.classList.add('gone');
        setTimeout(() => sIntro.classList.remove('screen-hidden'), 80);
      }

      // ── Helpers ──────────────────────────────────────────────────────────
      function showScreen(el) {
        [sIntro, sBooth, sShare].forEach(s => s.classList.add('screen-hidden'));
        el.classList.remove('screen-hidden');
      }

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3200);
      }

      function lerp(a, b, t) { return a + (b - a) * t; }

      // ── Controls ──────────────────────────────────────────────────────────
      wingScaleEl.oninput = () => {
        S.wingScale = +wingScaleEl.value / 100;
        wingScaleV.textContent = wingScaleEl.value + '%';
      };

      const wingYAdjEl = document.getElementById('wingYAdj');
      const wingYAdjV = document.getElementById('wingYAdjVal');
      if (window.innerWidth <= 768) {
        S.wingYAdj = 18;
        wingYAdjEl.value = 18;
        wingYAdjV.textContent = '18';
      }
      wingYAdjEl.oninput = () => {
        S.wingYAdj = +wingYAdjEl.value;
        wingYAdjV.textContent = wingYAdjEl.value;
      };

      const wingXAdjEl = document.getElementById('wingXAdj');
      const wingXAdjV = document.getElementById('wingXAdjVal');
      wingXAdjEl.oninput = () => {
        S.wingXAdj = +wingXAdjEl.value;
        wingXAdjV.textContent = wingXAdjEl.value;
      };



      // Flip button: switch between front/back camera on mobile
      let currentFacing = 'user';
      mirrorBtn.onclick = async () => {
        currentFacing = currentFacing === 'user' ? 'environment' : 'user';
        // Stop current stream
        if (S.stream) {
          S.stream.getTracks().forEach(t => t.stop());
        }
        try {
          const isMobile = window.innerWidth <= 768;
          const videoConstraints = isMobile
            ? {
              facingMode: currentFacing,
              height: { ideal: 640 },
              aspectRatio: { ideal: window.innerHeight / window.innerWidth },
            }
            : {
              facingMode: currentFacing,
              width: { ideal: 720 },
              height: { ideal: 1280 },
            };

          S.stream = await navigator.mediaDevices.getUserMedia({
            video: videoConstraints,
            audio: false,
          });
          video.srcObject = S.stream;
          await new Promise(r => { video.onloadedmetadata = r; });
          await video.play();
          // Mirror automatically when using front camera
          S.mirror = currentFacing === 'user';
        } catch (e) {
          showToast('Could not switch camera');
          // Revert
          currentFacing = currentFacing === 'user' ? 'environment' : 'user';
        }
      };

      // ── Enter booth ───────────────────────────────────────────────────────
      enterBtn.onclick = async () => {
        enterBtn.disabled = true;
        enterBtn.textContent = 'Opening Camera…';
        try { await startBooth(); }
        catch (e) {
          enterBtn.disabled = false;
          enterBtn.textContent = 'Enter the Frame';
          showToast(e.message || 'Camera access denied');
        }
      };

      async function startBooth() {
        // 1. Camera
        const isMobile = window.innerWidth <= 768;
        const videoConstraints = isMobile
          ? {
            facingMode: currentFacing,
            height: { ideal: 640 },
            aspectRatio: { ideal: window.innerHeight / window.innerWidth },
          }
          : {
            facingMode: currentFacing,
            width: { ideal: 720 },
            height: { ideal: 1280 },
          };

        S.stream = await navigator.mediaDevices.getUserMedia({
          video: videoConstraints,
          audio: false,
        });
        video.srcObject = S.stream;
        await new Promise(r => { video.onloadedmetadata = r; });
        await video.play();

        const vW = video.videoWidth, vH = video.videoHeight;

        // 2. Size canvas to match screen exactly (full screen background)
        const screenW = window.innerWidth, screenH = window.innerHeight;

        canvas.width = screenW;
        canvas.height = screenH;
        canvas.style.width = screenW + 'px';
        canvas.style.height = screenH + 'px';

        // frameCanvas processes raw video, must match video dimensions
        frameCanvas.width = vW;
        frameCanvas.height = vH;

        // 3. Load segmenter
        if (!S.segmenter) {
          const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.15/wasm"
          );
          S.segmenter = await ImageSegmenter.createFromOptions(vision, {
            baseOptions: {
              modelAssetPath: "https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite",
              delegate: "GPU",
            },
            outputCategoryMask: false,
            outputConfidenceMasks: true,
            runningMode: "VIDEO",
          });
        }

        // 4. Load pose via script tag (MediaPipe Pose is separate from Tasks Vision)
        if (!window._poseReady) {
          await loadPose();
        }

        showScreen(sBooth);
        livePill.classList.add('on');
        shutterBtn.disabled = false;
        S.running = true;
        S.prevMask = null;
        loop();
      }

      // ── MediaPipe Pose (holistic pose) via legacy CDN ────────────────────
      function loadPose() {
        return new Promise((resolve) => {
          if (window.Pose) { initPose(resolve); return; }
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js';
          s.crossOrigin = 'anonymous';
          s.onload = () => initPose(resolve);
          s.onerror = () => { console.warn('Pose failed to load — using fallback shoulders'); resolve(); };
          document.head.appendChild(s);
        });
      }

      function initPose(resolve) {
        if (!window.Pose) { resolve(); return; }
        const pose = new window.Pose({
          locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/${f}`
        });
        pose.setOptions({
          modelComplexity: 0,     // 0=lite, fast for mobile
          smoothLandmarks: true,
          enableSegmentation: false,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5,
        });
        pose.onResults(onPoseResults);
        S.pose = pose;
        window._poseReady = true;
        resolve();
      }

      let poseFrameCount = 0;
      function onPoseResults(results) {
        if (!results.poseLandmarks) return;
        const lm = results.poseLandmarks;
        // MediaPipe Pose: 11=left shoulder, 12=right shoulder
        // In mirrored video, left/right are visually swapped — we handle in draw
        const ls = lm[11], rs = lm[12];
        if (!ls || !rs) return;

        const isFirstDetection = !S.poseReady;

        // Smooth
        if (isFirstDetection) {
          S.leftShoulder.x = ls.x;
          S.leftShoulder.y = ls.y;
          S.rightShoulder.x = rs.x;
          S.rightShoulder.y = rs.y;
          S.poseReady = true;
        } else {
          S.leftShoulder.x = lerp(S.leftShoulder.x, ls.x, LERP);
          S.leftShoulder.y = lerp(S.leftShoulder.y, ls.y, LERP);
          S.rightShoulder.x = lerp(S.rightShoulder.x, rs.x, LERP);
          S.rightShoulder.y = lerp(S.rightShoulder.y, rs.y, LERP);
        }

      }

      // ── Main loop ─────────────────────────────────────────────────────────
      async function loop() {
        if (!S.running) return;
        const now = performance.now();

        if (video.readyState >= 2 && now !== S.lastTs) {
          // Run pose every 3rd frame (saves CPU on mobile)
          if (S.pose && poseFrameCount % 3 === 0) {
            try { await S.pose.send({ image: video }); } catch (_) { }
          }
          poseFrameCount++;

          // Segmentation every frame, throttled to ~20fps
          if (now - S.segmentLastTs > 50) {
            try {
              const result = S.segmenter.segmentForVideo(video, now);
              if (result?.confidenceMasks?.length > 0) {
                renderFrame(result.confidenceMasks[0]);
                result.close();
              }
            } catch (_) { }
            S.segmentLastTs = now;
          }

          S.lastTs = now;
        }

        S.animId = requestAnimationFrame(loop);
      }

      // ── Core compositor (no background removal) ─────────────────────────
      function renderFramePlain() {
        const W = canvas.width, H = canvas.height;
        const vW = frameCanvas.width, vH = frameCanvas.height;

        frameCtx.save();
        if (S.mirror) { frameCtx.translate(vW, 0); frameCtx.scale(-1, 1); }
        frameCtx.drawImage(video, 0, 0, vW, vH);
        frameCtx.restore();

        const videoData = frameCtx.getImageData(0, 0, vW, vH);

        const videoAspect = vW / vH;
        const canvasAspect = W / H;
        let drawW, drawH, drawX, drawY;
        if (videoAspect > canvasAspect) {
          drawH = H; drawW = H * videoAspect;
          drawX = (W - drawW) / 2; drawY = 0;
        } else {
          drawW = W; drawH = W / videoAspect;
          drawX = 0; drawY = (H - drawH) / 2;
        }

        const lx = drawX + 0.22 * drawW; const rx = drawX + 0.78 * drawW;
        const ly = drawY + (0.50 + S.yShift) * drawH; const ry = ly;
        const shoulderDist = Math.abs(rx - lx);
        const wingW = shoulderDist * S.wingScale;
        const wingH = wingW * (leftImg.naturalHeight / leftImg.naturalWidth);
        const ATTACH_X_FRAC = 0.08, ATTACH_Y_FRAC = 0.38;
        const adjY = S.wingYAdj * (H / 100);
        const adjX = S.wingXAdj * (W / 100);
        const lxF = lx - adjX, lyF = ly + adjY;
        const rxF = rx + adjX, ryF = ry + adjY;

        ctx.clearRect(0, 0, W, H);
        drawCover(ctx, bgImg, W, H);
        personCtx.putImageData(videoData, 0, 0);
        ctx.drawImage(personC, drawX, drawY, drawW, drawH);
        drawLeftWing(ctx, leftImg, lxF, lyF, wingW, wingH, ATTACH_X_FRAC, ATTACH_Y_FRAC);
        drawRightWing(ctx, rightImg, rxF, ryF, wingW, wingH, ATTACH_X_FRAC, ATTACH_Y_FRAC);
      }

      // ── Core compositor (with background removal) ─────────────────────────
      function renderFrame(mask) {
        const W = canvas.width, H = canvas.height;
        const vW = frameCanvas.width, vH = frameCanvas.height;
        const N = vW * vH;

        // 1. Initialize reusable buffers if size changes
        if (!alphaBuffer || alphaBuffer.length !== N) {
          alphaBuffer = new Float32Array(N);
          finBuffer = new Uint8Array(N);
          fmBuffer = new Uint8Array(N);
          personC.width = vW;
          personC.height = vH;
        }

        // 2. Extract mask to persistent buffer
        try {
          const floats = mask.getAsFloat32Array();
          for (let i = 0; i < N; i++) alphaBuffer[i] = Math.max(0, Math.min(1, floats[i]));
        } catch (_) {
          const tmp = document.createElement('canvas');
          tmp.width = vW; tmp.height = vH;
          const tc = tmp.getContext('2d');
          try { tc.drawImage(mask.getAsCanvas(), 0, 0, vW, vH); } catch (__) { }
          const d = tc.getImageData(0, 0, vW, vH).data;
          for (let i = 0; i < N; i++) alphaBuffer[i] = d[i * 4] / 255;
        }

        if (S.prevMask) {
          const t = 0.42;
          for (let i = 0; i < N; i++) alphaBuffer[i] = alphaBuffer[i] * (1 - t) + S.prevMask[i] * t;
        }

        // We must copy alphaBuffer for prevMask to avoid reference issues
        S.prevMask = new Float32Array(alphaBuffer);

        // Smoothstep threshold
        const lo = 0.35, hi = 0.65;
        for (let i = 0; i < N; i++) {
          const v = alphaBuffer[i];
          if (v <= lo) finBuffer[i] = 0;
          else if (v >= hi) finBuffer[i] = 255;
          else { const t = (v - lo) / (hi - lo); finBuffer[i] = Math.round(t * t * (3 - 2 * t) * 255); }
        }

        // 3. Draw video to frameCanvas (with mirror)
        frameCtx.save();
        if (S.mirror) { frameCtx.translate(vW, 0); frameCtx.scale(-1, 1); }
        frameCtx.drawImage(video, 0, 0, vW, vH);
        frameCtx.restore();

        const videoData = frameCtx.getImageData(0, 0, vW, vH);
        const vd = videoData.data;

        // Apply alpha — mirror the mask too if mirrored
        if (S.mirror) {
          for (let y = 0; y < vH; y++) {
            for (let x = 0; x < vW; x++) fmBuffer[y * vW + (vW - 1 - x)] = finBuffer[y * vW + x];
          }
          for (let i = 0; i < N; i++) vd[i * 4 + 3] = fmBuffer[i];
        } else {
          for (let i = 0; i < N; i++) vd[i * 4 + 3] = finBuffer[i];
        }

        // Calculate cover video box
        const videoAspect = vW / vH;
        const canvasAspect = W / H;
        let drawW, drawH, drawX, drawY;
        if (videoAspect > canvasAspect) {
          drawH = H; drawW = H * videoAspect;
          drawX = (W - drawW) / 2; drawY = 0;
        } else {
          drawW = W; drawH = W / videoAspect;
          drawX = 0; drawY = (H - drawH) / 2;
        }

        // Fixed wing positions (no shoulder tracking)
        const lx = drawX + 0.22 * drawW; const rx = drawX + 0.78 * drawW;
        const ly = drawY + (0.50 + S.yShift) * drawH; const ry = ly;

        const shoulderDist = Math.abs(rx - lx);
        const wingW = shoulderDist * S.wingScale;
        const wingH = wingW * (leftImg.naturalHeight / leftImg.naturalWidth);
        const ATTACH_X_FRAC = 0.08, ATTACH_Y_FRAC = 0.38;

        const adjY = S.wingYAdj * (H / 100);
        const adjX = S.wingXAdj * (W / 100);
        const lxF = lx - adjX, lyF = ly + adjY;
        const rxF = rx + adjX, ryF = ry + adjY;

        // 4. Compose layers onto canvas
        ctx.clearRect(0, 0, W, H);
        drawCover(ctx, bgImg, W, H);

        // REUSING the personC canvas instead of recreating it!
        personCtx.putImageData(videoData, 0, 0);
        ctx.drawImage(personC, drawX, drawY, drawW, drawH);

        drawLeftWing(ctx, leftImg, lxF, lyF, wingW, wingH, ATTACH_X_FRAC, ATTACH_Y_FRAC);
        drawRightWing(ctx, rightImg, rxF, ryF, wingW, wingH, ATTACH_X_FRAC, ATTACH_Y_FRAC);
      }

      // Cover-fit background
      function drawCover(ctx, img, W, H) {
        if (!img.complete || !img.naturalWidth) return;
        const ir = img.naturalWidth / img.naturalHeight;
        const cr = W / H;
        let sw, sh, sx, sy;
        if (ir > cr) { sh = H; sw = H * ir; sy = 0; sx = (W - sw) / 2; }
        else { sw = W; sh = W / ir; sx = 0; sy = (H - sh) / 2; }
        ctx.drawImage(img, sx, sy, sw, sh);
      }

      // Left wing: inner-right edge of wing image anchors at left shoulder
      // attachXFrac = how far from the right edge inward the root quill sits
      // attachYFrac = how far from the top the root quill sits
      function drawLeftWing(ctx, img, shoulderX, shoulderY, w, h, attachXFrac, attachYFrac) {
        if (!img.complete || !img.naturalWidth) return;
        // The attachment point within the wing image is at (w*(1-attachXFrac), h*attachYFrac)
        // We want that point to sit exactly at (shoulderX, shoulderY)
        const x = shoulderX - w * (1 - attachXFrac);
        const y = shoulderY - h * attachYFrac;
        ctx.drawImage(img, x, y, w, h);
      }

      // Right wing: inner-left edge anchors at right shoulder, extends rightward
      function drawRightWing(ctx, img, shoulderX, shoulderY, w, h, attachXFrac, attachYFrac) {
        if (!img.complete || !img.naturalWidth) return;
        // The attachment point within the wing image is at (w*attachXFrac, h*attachYFrac)
        const x = shoulderX - w * attachXFrac;
        const y = shoulderY - h * attachYFrac;
        ctx.drawImage(img, x, y, w, h);
      }

      // ── Capture ───────────────────────────────────────────────────────────
      const countdownEl = document.getElementById('countdown');
      const countdownNum = document.getElementById('countdown-num');

      function doCapture() {
        // Flash: snap on
        flash.classList.remove('fade');
        flash.classList.add('on');

        // Capture frame at peak of flash
        setTimeout(() => {
          const out = document.createElement('canvas');
          out.width = canvas.width; out.height = canvas.height;
          out.getContext('2d').drawImage(canvas, 0, 0);
          const dataUrl = out.toDataURL('image/jpeg', 0.92);
          capturedImg.src = dataUrl;
          S._captureDataUrl = dataUrl;

          // Flash fade out
          flash.classList.remove('on');
          flash.classList.add('fade');

          // Stop loop and show share screen after flash fades
          setTimeout(() => {
            flash.classList.remove('fade');
            S.running = false;
            if (S.animId) cancelAnimationFrame(S.animId);
            showScreen(sShare);
          }, 420);
        }, 80);
      }

      shutterBtn.onclick = () => {
        if (shutterBtn.disabled) return;
        shutterBtn.disabled = true;

        // Button pop animation
        shutterBtn.classList.add('firing');
        shutterBtn.addEventListener('animationend', () => shutterBtn.classList.remove('firing'), { once: true });

        // 2-second countdown then capture
        let count = 2;
        countdownNum.textContent = count;
        countdownEl.classList.add('visible');

        const tick = () => {
          count--;
          if (count <= 0) {
            countdownEl.classList.remove('visible');
            doCapture();
          } else {
            // Restart the pop animation by forcing a reflow
            countdownNum.style.animation = 'none';
            countdownNum.offsetHeight; // reflow
            countdownNum.style.animation = '';
            countdownNum.textContent = count;
            setTimeout(tick, 1000);
          }
        };
        setTimeout(tick, 1000);
      };

      downloadBtn.onclick = () => {
        const a = document.createElement('a');
        a.href = capturedImg.src;
        a.download = 'rao-bahadur-' + Date.now() + '.jpg';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };

      // Share button — show only if Web Share API is available
      const shareBtn = document.getElementById('shareBtn');
      const shareHint = document.getElementById('shareHint');
      if (navigator.share && navigator.canShare) {
        shareBtn.style.display = '';
        shareHint.style.display = 'none';
      }

      shareBtn.onclick = async () => {
        try {
          // Convert dataURL to Blob for sharing
          const res = await fetch(capturedImg.src);
          const blob = await res.blob();
          const file = new File([blob], 'rao-bahadur-royal-' + Date.now() + '.jpg', { type: 'image/jpeg' });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
              files: [file],
              title: 'Rao Bahadur · Portrait',
              text: 'I just posed for Rao Bahadur! 🦚'
            });
          } else if (navigator.share) {
            await navigator.share({
              title: 'Rao Bahadur · Portrait',
              text: 'I just posed for Rao Bahadur! 🦚',
              url: window.location.href,
            });
          }
        } catch (e) {
          if (e.name !== 'AbortError') showToast('Could not share — try saving instead');
        }
      };

      retakeBtn.onclick = () => {
        S.running = true;
        shutterBtn.disabled = false;
        showScreen(sBooth);
        loop();
      };

      backBtn.onclick = () => {
        stopAll();
        livePill.classList.remove('on');
        shutterBtn.disabled = true;
        enterBtn.disabled = false;
        enterBtn.textContent = 'Enter the Frame';
        showScreen(sIntro);
      };

      function stopAll() {
        S.running = false;
        if (S.animId) cancelAnimationFrame(S.animId);
        if (S.stream) { S.stream.getTracks().forEach(t => t.stop()); S.stream = null; }
        S.prevMask = null; S.poseReady = false;
      }

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) S.running = false;
        else if (S.stream && !sBooth.classList.contains('screen-hidden')) { S.running = true; loop(); }
      });

    })();
  </script>
</body>

</html>
